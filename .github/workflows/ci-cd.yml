name: CI / CD - video-workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: video-workflow-prod
  cancel-in-progress: true

env:
  ECR_ALIAS: ${{ vars.ECR_PUBLIC_ALIAS }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  IMAGE_NAME: public.ecr.aws/${{ vars.ECR_PUBLIC_ALIAS }}/video-workflow
  IMAGE_TAG: sha-${{ github.sha }}

jobs:

  ###########################################################
  # BUILD & PUSH IMAGE
  ###########################################################
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      ###########################################################
      # JAVA SETUP
      ###########################################################
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      ###########################################################
      # BUILD + TEST + COVERAGE
      ###########################################################
      - name: Build with Tests and Coverage
        run: mvn -B clean verify

      ###########################################################
      # TEST REPORT
      ###########################################################
      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

      ###########################################################
      # UPLOAD COVERAGE
      ###########################################################
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco

      ###########################################################
      # SHOW COVERAGE IN PR
      ###########################################################
      - name: Jacoco Coverage Report
        uses: madrapps/jacoco-report@v1.6
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Ensure ECR Public repository exists
        run: |
          REPO="video-workflow"
          if ! aws ecr-public describe-repositories --repository-names "$REPO" --region "$AWS_REGION" >/dev/null 2>&1; then
            aws ecr-public create-repository --repository-name "$REPO" --region "$AWS_REGION"
          fi

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region "$AWS_REGION" \
          | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build and Push Image
        run: |
          docker build -f docker/app/Dockerfile -t "$IMAGE_NAME:$IMAGE_TAG" .
          docker push "$IMAGE_NAME:$IMAGE_TAG"
          docker tag "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:latest"

  ###########################################################
  # TERRAFORM APPLY
  ###########################################################
  terraform-apply:
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-push

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      ###########################################################
      # Terraform Init
      ###########################################################
      - name: Terraform Init
        run: terraform init -input=false -reconfigure

      ###########################################################
      # Terraform Apply
      ###########################################################
      - name: Terraform Apply
        run: |
          FULL_IMAGE="$IMAGE_NAME:$IMAGE_TAG"
          echo "Deploying image: $FULL_IMAGE"

          terraform apply -input=false -auto-approve -lock-timeout=300s \
            -var region="${{ vars.AWS_REGION }}" \
            -var eks_cluster_name="${{ vars.EKS_CLUSTER_NAME }}" \
            -var app_image="$FULL_IMAGE" \
            -var db_user="${{ secrets.DB_USER }}" \
            -var db_password="${{ secrets.DB_PASSWORD }}" \
            -var spring_datasource_url="${{ vars.SPRING_DATASOURCE_URL }}" \
            -var video_bucket="${{ vars.VIDEO_BUCKET }}" \
            -var aws_sqs_status_queue_url="${{ vars.AWS_SQS_STATUS_QUEUE_URL }}" \
            -var aws_sqs_notifications_queue_url="${{ vars.AWS_SQS_NOTIFICATIONS_QUEUE_URL }}" \
            -var sns_topic_arn="${{ vars.SNS_TOPIC_ARN }}" \
            -var aws_s3_endpoint="${{ vars.AWS_S3_ENDPOINT }}" \
            -var aws_s3_path_style_access="${{ vars.AWS_S3_PATH_STYLE_ACCESS }}" \
            -var ses_from_email="${{ vars.SES_FROM_EMAIL }}" \
            -var force_rollout="$(date +%s)"

      ###########################################################
      # Wait for Ingress (segurança extra)
      ###########################################################
      - name: Configure kubectl
        run: |
          aws eks --region "${{ vars.AWS_REGION }}" update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER_NAME }}"

      - name: Wait for Ingress LoadBalancer
        run: |
          set -euo pipefail
          NAMESPACE=hackathon
          INGRESS_NAME=video-workflow-route

          for i in {1..30}; do
            HOSTNAME=$(kubectl get ingress "$INGRESS_NAME" -n "$NAMESPACE" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)

            if [ -n "$HOSTNAME" ]; then
              echo "Ingress hostname ready: $HOSTNAME"
              break
            fi

            echo "Waiting for ingress..."
            sleep 10
          done

      ###########################################################
      # Show Final API Gateway URL
      ###########################################################
      - name: Show API Gateway URL
        run: |
          echo ""
          echo "==============================================="
          echo "API Gateway Endpoint:"
          terraform output api_gateway_url
          echo ""
          echo "Full URL:"
          echo "$(terraform output -raw api_gateway_url)/hackathon/v1/video-workflow"
          echo "==============================================="