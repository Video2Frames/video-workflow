name: CI / CD - video-workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: video-workflow-prod
  cancel-in-progress: true

env:
  APP_NAME: video-workflow
  ECR_PUBLIC_ALIAS: ${{ vars.ECR_PUBLIC_ALIAS }}
  APP_IMAGE: public.ecr.aws/${{ vars.ECR_PUBLIC_ALIAS }}/video-workflow
  APP_IMAGE_TAG: sha-${{ github.sha }}

jobs:

  # =========================================================
  # TERRAFORM PLAN
  # =========================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -input=false \
            -var region="${{ vars.AWS_REGION }}" \
            -var app_image="${{ env.APP_IMAGE }}:${{ env.APP_IMAGE_TAG }}" \
            -var db_user="${{ secrets.DB_USER }}" \
            -var db_password="${{ secrets.DB_PASSWORD }}" \
            -var spring_datasource_url="${{ vars.SPRING_DATASOURCE_URL }}" \
            -var video_bucket="${{ vars.VIDEO_BUCKET }}" \
            -var aws_sqs_status_queue_url="${{ vars.AWS_SQS_STATUS_QUEUE_URL }}" \
            -var sns_topic_arn="${{ vars.SNS_TOPIC_ARN }}" \
            -var aws_sns_endpoint="${{ vars.AWS_SNS_ENDPOINT }}" \
            -var aws_s3_endpoint="${{ vars.AWS_S3_ENDPOINT }}" \
            -var aws_s3_path_style_access="${{ vars.AWS_S3_PATH_STYLE_ACCESS }}" \
            -var force_rollout="$(date +%s)"

  # =========================================================
  # SONARCLOUD
  # =========================================================
#  sonarqube:
#    name: SonarCloud
#    runs-on: ubuntu-latest
#    needs: terraform-plan
#    if: github.ref == 'refs/heads/main'
#    environment: production
#
#    steps:
#      - uses: actions/checkout@v4
#        with:
#          fetch-depth: 0
#
#      - uses: actions/setup-java@v4
#        with:
#          java-version: 17
#          distribution: zulu
#
#      - uses: actions/cache@v4
#        with:
#          path: ~/.sonar/cache
#          key: ${{ runner.os }}-sonar
#
#      - uses: actions/cache@v4
#        with:
#          path: ~/.m2
#          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
#
#      - name: Build, test and analyze
#        env:
#          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
#        run: |
#          mvn -B clean verify \
#            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
#            -Dsonar.projectKey=soat-tech-challenge-2025_video-workflow \
#            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/site/jacoco-it/jacoco.xml

  # =========================================================
  # BUILD & PUSH IMAGE
  # =========================================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    environment: production
    needs: sonarqube
    if: github.ref == 'refs/heads/main'
    outputs:
      APP_IMAGE: ${{ steps.set_image.outputs.app_image }}

    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Set Image Output
        id: set_image
        run: |
          echo "app_image=${APP_IMAGE}" >> $GITHUB_OUTPUT

      - name: Ensure ECR Public repository exists
        run: |
          REPO_NAME="video-workflow"
          if ! aws ecr-public describe-repositories --repository-names "$REPO_NAME" --region "${{ vars.AWS_REGION }}" >/dev/null 2>&1; then
            aws ecr-public create-repository --repository-name "$REPO_NAME" --region "${{ vars.AWS_REGION }}"
          fi

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region ${{ vars.AWS_REGION }} \
          | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build and Push
        run: |
          docker build -f docker/app/Dockerfile -t "$APP_IMAGE:$APP_IMAGE_TAG" .
          docker push "$APP_IMAGE:$APP_IMAGE_TAG"
          docker tag "$APP_IMAGE:$APP_IMAGE_TAG" "$APP_IMAGE:latest"
          docker push "$APP_IMAGE:latest"

  # =========================================================
  # TERRAFORM APPLY
  # =========================================================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13"

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve \
            -var region="${{ vars.AWS_REGION }}" \
            -var app_image="${{ needs.build-and-push.outputs.APP_IMAGE }}:${{ env.APP_IMAGE_TAG }}" \
            -var db_user="${{ secrets.DB_USER }}" \
            -var db_password="${{ secrets.DB_PASSWORD }}" \
            -var spring_datasource_url="${{ vars.SPRING_DATASOURCE_URL }}" \
            -var video_bucket="${{ vars.VIDEO_BUCKET }}" \
            -var aws_sqs_status_queue_url="${{ vars.AWS_SQS_STATUS_QUEUE_URL }}" \
            -var sns_topic_arn="${{ vars.SNS_TOPIC_ARN }}" \
            -var aws_sns_endpoint="${{ vars.AWS_SNS_ENDPOINT }}" \
            -var aws_s3_endpoint="${{ vars.AWS_S3_ENDPOINT }}" \
            -var aws_s3_path_style_access="${{ vars.AWS_S3_PATH_STYLE_ACCESS }}" \
            -var force_rollout="$(date +%s)"

      - name: Configure kubectl
        run: |
          aws eks --region ${{ vars.AWS_REGION }} update-kubeconfig \
            --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Wait for Ingress
        run: |
          set -euo pipefail
          NAMESPACE=hackathon
          INGRESS_NAME=video-workflow-route

          for i in {1..30}; do
            HOSTNAME=$(kubectl get ingress "$INGRESS_NAME" -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$HOSTNAME" ]; then
              echo "Ingress hostname: $HOSTNAME"
              exit 0
            fi
            echo "Waiting for ingress..."
            sleep 10
          done

          echo "Ingress not ready in time"
          exit 1