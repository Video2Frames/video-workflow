name: CI / CD - video-workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: video-workflow-prod
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  APP_NAME: video-workflow
  AWS_REGION: ${{ vars.AWS_REGION }}
  IMAGE_NAME: public.ecr.aws/${{ vars.ECR_PUBLIC_ALIAS }}/video-workflow
  IMAGE_TAG: sha-${{ github.sha }}

###########################################################
# JOBS
###########################################################
jobs:

  ###########################################################
  # TERRAFORM FORMAT CHECK
  ###########################################################

  terraform-format:
    name: Terraform Format Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13"

      - name: Terraform Format
        run: terraform fmt -check

  ###########################################################
  # BUILD + TEST + COVERAGE
  ###########################################################

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: terraform-format

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build with Tests
        run: mvn -B clean verify

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  ###########################################################
  # SONARCLOUD
  ###########################################################

  sonarqube:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=videoframes_video-workflow \
            -Dsonar.organization=video2frames \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  ###########################################################
  # BUILD & PUSH IMAGE
  ###########################################################

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: sonarqube
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Ensure ECR Public repository exists
        run: |
          REPO="video-workflow"

          if ! aws ecr-public describe-repositories \
          --repository-names "$REPO" \
          --region "$AWS_REGION" >/dev/null 2>&1; then
            aws ecr-public create-repository \
            --repository-name "$REPO" \
            --region "$AWS_REGION"
          fi

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region "$AWS_REGION" \
          | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build and Push Image
        run: |
          docker build -f docker/app/Dockerfile \
            -t "$IMAGE_NAME:$IMAGE_TAG" .

          docker push "$IMAGE_NAME:$IMAGE_TAG"

          docker tag "$IMAGE_NAME:$IMAGE_TAG" "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:latest"

  ###########################################################
  # TERRAFORM APPLY
  ###########################################################

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    environment: production

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      ###########################################################
      # Terraform Init
      ###########################################################

      - name: Terraform Init
        run: terraform init -input=false -reconfigure

      ###########################################################
      # Terraform Apply
      ###########################################################

      - name: Terraform Apply
        run: |
          FULL_IMAGE="$IMAGE_NAME:$IMAGE_TAG"

          terraform apply -input=false -auto-approve -lock-timeout=300s \
            -var region="${{ vars.AWS_REGION }}" \
            -var eks_cluster_name="${{ vars.EKS_CLUSTER_NAME }}" \
            -var app_image="$FULL_IMAGE" \
            -var db_user="${{ secrets.DB_USER }}" \
            -var db_password="${{ secrets.DB_PASSWORD }}" \
            -var spring_datasource_url="${{ vars.SPRING_DATASOURCE_URL }}" \
            -var video_bucket="${{ vars.VIDEO_BUCKET }}" \
            -var aws_sqs_status_queue_url="${{ vars.AWS_SQS_STATUS_QUEUE_URL }}" \
            -var aws_sqs_notifications_queue_url="${{ vars.AWS_SQS_NOTIFICATIONS_QUEUE_URL }}" \
            -var sns_topic_arn="${{ vars.SNS_TOPIC_ARN }}" \
            -var aws_s3_endpoint="${{ vars.AWS_S3_ENDPOINT }}" \
            -var aws_s3_path_style_access="${{ vars.AWS_S3_PATH_STYLE_ACCESS }}" \
            -var ses_from_email="${{ vars.SES_FROM_EMAIL }}" \
            -var force_rollout="$(date +%s)"

      ###########################################################
      # Configure kubectl
      ###########################################################

      - name: Configure kubectl
        run: |
          aws eks --region "${{ vars.AWS_REGION }}" update-kubeconfig \
            --name "${{ vars.EKS_CLUSTER_NAME }}"

      ###########################################################
      # Show Ingress
      ###########################################################

      - name: Show Ingress
        run: |
          kubectl get ingress -n hackathon