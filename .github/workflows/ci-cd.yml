name: CI / CD - video-workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: video-workflow
  # Public ECR alias (e.g. p6c0d2v5). Set this in repository vars.
  ECR_PUBLIC_ALIAS: ${{ vars.ECR_PUBLIC_ALIAS }}
  APP_IMAGE: public.ecr.aws/${{ vars.ECR_PUBLIC_ALIAS }}/video-workflow
  APP_IMAGE_TAG: sha-${{ github.sha }}

jobs:
# =========================================================
# TERRAFORM PLAN
# =========================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -var region="${{ vars.AWS_REGION }}" \
            -var app_image="${{ env.APP_IMAGE }}:${{ env.APP_IMAGE_TAG }}" \
            -var db_user="${{ secrets.DB_USER }}" \
            -var db_password="${{ secrets.DB_PASSWORD }}" \
            -var sns_topic_arn="${{ secrets.SNS_TOPIC_ARN }}" \
            -var api_url="${{ secrets.API_URL }}" \
            -var aws_access_key="${{ secrets.AWS_ACCESS_KEY }}" \
            -var aws_access_secret="${{ secrets.AWS_ACCESS_SECRET }}" \
            -var aws_region="${{ vars.AWS_REGION }}" \
            -var aws_account_id="${{ secrets.AWS_ACCOUNT_ID }}" \
            -var force_rollout="$(date +%s)"

# =========================================================
# SONARCLOUD
# =========================================================
  sonarqube:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build, test and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=soat-tech-challenge-2025_video-workflow \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml,target/site/jacoco-it/jacoco.xml

# =========================================================
# BUILD & PUSH IMAGE
# =========================================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    environment: production
    needs: sonarqube
    if: github.ref == 'refs/heads/main'
    outputs:
      APP_IMAGE: ${{ steps.resolve_ecr.outputs.app_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Resolve APP_IMAGE from infra-created ECR repo
        id: resolve_ecr
        run: |
          set -euo pipefail
          REGION="${{ vars.AWS_REGION }}"
          # Expected repo name created by infra
          REPO_NAME="video2frames-video-processor"

          # Try to get the repositoryUri from ECR Public
          REPO_URI=$(aws ecr-public describe-repositories \
            --region "$REGION" \
            --repository-names "$REPO_NAME" --query 'repositories[0].repositoryUri' --output text 2>/dev/null || true)

          if [ -n "$REPO_URI" ] && [ "$REPO_URI" != "None" ]; then
            echo "Found infra ECR repo: $REPO_URI"
            echo "APP_IMAGE=$REPO_URI" >> $GITHUB_ENV
            echo "app_image=$REPO_URI" >> $GITHUB_OUTPUT
          else
            # Fallback: use configured alias + default repo name (video-workflow)
            FALLBACK="public.ecr.aws/${{ vars.ECR_PUBLIC_ALIAS }}/video-workflow"
            echo "Infra ECR repo not found, falling back to $FALLBACK"
            echo "APP_IMAGE=$FALLBACK" >> $GITHUB_ENV
            echo "app_image=$FALLBACK" >> $GITHUB_OUTPUT
          fi

      - name: Ensure ECR Public repository exists (create if missing)
        run: |
          REGION="${{ vars.AWS_REGION }}"
          # derive repo name from APP_IMAGE (last path element)
          APP_IMAGE_FULL="$APP_IMAGE"
          REPO_NAME=$(basename "$APP_IMAGE_FULL")
          if ! aws ecr-public describe-repositories --repository-names "$REPO_NAME" --region "$REGION" >/dev/null 2>&1; then
            echo "Creating public ECR repository: $REPO_NAME"
            aws ecr-public create-repository --repository-name "$REPO_NAME" --region "$REGION"
          else
            echo "Repository $REPO_NAME already exists in public ECR"
          fi

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region ${{ vars.AWS_REGION }} | docker login --username AWS --password-stdin public.ecr.aws

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push App Image (docker CLI)
        run: |
          set -euo pipefail
          echo "Using APP_IMAGE=$APP_IMAGE"
          echo "Building image $APP_IMAGE:$APP_IMAGE_TAG"
          docker build -f docker/app/Dockerfile -t "$APP_IMAGE:$APP_IMAGE_TAG" .
          echo "Pushing $APP_IMAGE:$APP_IMAGE_TAG"
          docker push "$APP_IMAGE:$APP_IMAGE_TAG"
          echo "Tagging and pushing latest"
          docker tag "$APP_IMAGE:$APP_IMAGE_TAG" "$APP_IMAGE:latest" || true
          docker push "$APP_IMAGE:latest" || true
        # APP_IMAGE is provided via GITHUB_ENV in previous step (resolve_ecr)

# =========================================================
# TERRAFORM APPLY
# =========================================================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var region="${{ vars.AWS_REGION }}" \
            -var app_image="${{ needs.build-and-push.outputs.APP_IMAGE }}:${{ env.APP_IMAGE_TAG }}" \
            -var db_user="${{ secrets.DB_USER }}" \
            -var db_password="${{ secrets.DB_PASSWORD }}" \
            -var sns_topic_arn="${{ secrets.SNS_TOPIC_ARN }}" \
            -var api_url="${{ secrets.API_URL }}" \
            -var aws_access_key="${{ secrets.AWS_ACCESS_KEY }}" \
            -var aws_access_secret="${{ secrets.AWS_ACCESS_SECRET }}" \
            -var aws_region="${{ vars.AWS_REGION }}" \
            -var aws_account_id="${{ secrets.AWS_ACCOUNT_ID }}" \
            -var force_rollout="$(date +%s)"

      - name: Configure kubectl for EKS
        run: |
          aws eks --region ${{ vars.AWS_REGION }} update-kubeconfig \
            --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Log Ingress Hosts/IPs
        run: |
          kubectl get ingress -n hackathon

