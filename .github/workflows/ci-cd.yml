name: CI / CD - video-workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: video-workflow-prod
  cancel-in-progress: true

env:
  APP_NAME: video-workflow
  ECR_PUBLIC_ALIAS: ${{ vars.ECR_PUBLIC_ALIAS }}
  IMAGE_NAME: public.ecr.aws/${{ vars.ECR_PUBLIC_ALIAS }}/video-workflow
  IMAGE_TAG: sha-${{ github.sha }}

jobs:

  # =========================================================
  # BUILD & PUSH IMAGE
  # =========================================================
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    environment: production
    if: github.ref == 'refs/heads/main'
    outputs:
      FULL_IMAGE: ${{ steps.export.outputs.full_image }}

    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Export Full Image
        id: export
        run: echo "full_image=${IMAGE_NAME}:${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Ensure ECR Public repository exists
        run: |
          REPO_NAME="video-workflow"
          if ! aws ecr-public describe-repositories --repository-names "$REPO_NAME" --region "${{ vars.AWS_REGION }}" >/dev/null 2>&1; then
            aws ecr-public create-repository --repository-name "$REPO_NAME" --region "${{ vars.AWS_REGION }}"
          fi

      - name: Login to Amazon ECR Public
        run: |
          aws ecr-public get-login-password --region ${{ vars.AWS_REGION }} \
          | docker login --username AWS --password-stdin public.ecr.aws

      - name: Build and Push
        run: |
          docker build -f docker/app/Dockerfile -t "${IMAGE_NAME}:${IMAGE_TAG}" .
          docker push "${IMAGE_NAME}:${IMAGE_TAG}"
          docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:latest"


  # =========================================================
  # TERRAFORM PLAN
  # =========================================================
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: production
    needs: build-and-push
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13"

      - name: Terraform Format Check
        run: terraform fmt -check

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Terraform Init
        run: terraform init -input=false -reconfigure

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -input=false -lock-timeout=300s \
            -var region="${{ vars.AWS_REGION }}" \
            -var eks_cluster_name="${{ vars.EKS_CLUSTER_NAME }}" \
            -var app_image="${{ needs.build-and-push.outputs.FULL_IMAGE }}" \
            -var db_user="${{ secrets.DB_USER }}" \
            -var db_password="${{ secrets.DB_PASSWORD }}" \
            -var spring_datasource_url="${{ vars.SPRING_DATASOURCE_URL }}" \
            -var video_bucket="${{ vars.VIDEO_BUCKET }}" \
            -var aws_sqs_status_queue_url="${{ vars.AWS_SQS_STATUS_QUEUE_URL }}" \
            -var sns_topic_arn="${{ vars.SNS_TOPIC_ARN }}" \
            -var aws_s3_endpoint="${{ vars.AWS_S3_ENDPOINT }}" \
            -var aws_s3_path_style_access="${{ vars.AWS_S3_PATH_STYLE_ACCESS }}" \
            -var force_rollout="$(date +%s)"


  # =========================================================
  # TERRAFORM APPLY
  # =========================================================
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13"

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET }}

      - name: Terraform Init
        run: terraform init -input=false -reconfigure

      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve -lock-timeout=300s \
            -var region="${{ vars.AWS_REGION }}" \
            -var eks_cluster_name="${{ vars.EKS_CLUSTER_NAME }}" \
            -var app_image="${{ needs.build-and-push.outputs.FULL_IMAGE }}" \
            -var db_user="${{ secrets.DB_USER }}" \
            -var db_password="${{ secrets.DB_PASSWORD }}" \
            -var spring_datasource_url="${{ vars.SPRING_DATASOURCE_URL }}" \
            -var video_bucket="${{ vars.VIDEO_BUCKET }}" \
            -var aws_sqs_status_queue_url="${{ vars.AWS_SQS_STATUS_QUEUE_URL }}" \
            -var sns_topic_arn="${{ vars.SNS_TOPIC_ARN }}" \
            -var aws_s3_endpoint="${{ vars.AWS_S3_ENDPOINT }}" \
            -var aws_s3_path_style_access="${{ vars.AWS_S3_PATH_STYLE_ACCESS }}" \
            -var force_rollout="$(date +%s)"

      - name: Configure kubectl
        run: |
          aws eks --region ${{ vars.AWS_REGION }} update-kubeconfig \
            --name ${{ vars.EKS_CLUSTER_NAME }}