spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/video
    username: video
    password: video
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

aws:
  region: us-east-1
  s3:
    endpoint: http://localhost:4566
    access-key: test
    secret-key: test
    path-style-access: true
  sns:
    endpoint: http://localhost:4566
    topic-arn: arn:aws:sns:us-east-1:000000000000:video-processing-topic.fifo
  sqs:
    endpoint: http://localhost:4566
    status-queue-url: http://localhost:4566/000000000000/status-updates-processing-queue.fifo

aws.sqs.poll-delay-ms: 5000

# Permite logs mais verbosos do SQL em dev local
logging:
  level:
    org.hibernate.SQL: INFO