spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/video
    username: video
    password: video
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true


  # Limites de upload para multipart local
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
api:
  url: https://5r6zcppsr8.execute-api.us-east-1.amazonaws.com
server:
  port: ${SERVER_PORT:8080}

app:
  upload:
    bucket: video-bucket
    key-prefix: video-uploads/

aws:
  ses:
    from-email: noreply@video.com
    endpoint: http://localhost:4566
  region: us-east-1
  s3:
    endpoint: http://localhost:4566
    access-key: test
    secret-key: test
    path-style-access: true
  sns:
    endpoint: http://localhost:4566
    topic-arn: arn:aws:sns:us-east-1:000000000000:video-processing-topic.fifo
  sqs:
    endpoint: http://localhost:4566
    status-queue-url: http://localhost:4566/000000000000/status-updates-processing-queue.fifo
    notifications-queue-url: http://localhost:4566/000000000000/notifications-processing-queue.fifo

# Test recipient convenience for local testing (empty in prod)
notification:
  test:
    recipient: ponteskarenklp82@gmail.com

aws.sqs.poll-delay-ms: 5000

# Permite logs mais verbosos do SQL em dev local
logging:
  level:
    org.hibernate.SQL: ERROR