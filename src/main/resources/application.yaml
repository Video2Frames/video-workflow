spring:
  application:
    name: video-workflow
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/video}
    username: ${SPRING_DATASOURCE_USERNAME:video}
    password: ${SPRING_DATASOURCE_PASSWORD:video}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: false

server:
  port: ${SERVER_PORT:8080}

app:
  upload:
    bucket: ${VIDEO_BUCKET:video-bucket}
    key-prefix: ${VIDEO_KEY_PREFIX:videos}

aws:
  region: ${AWS_REGION:us-east-1}

  s3:
    endpoint: ${AWS_S3_ENDPOINT:}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    path-style-access: ${AWS_S3_PATH_STYLE_ACCESS:false}

  sns:
    topic-arn: ${AWS_SNS_TOPIC_ARN:}
    endpoint: ${AWS_SNS_ENDPOINT:}

  sqs:
    endpoint: ${AWS_SQS_ENDPOINT:}
    status-queue-url: ${AWS_SQS_STATUS_QUEUE_URL:}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: ${OPENAPI_JSON_PATH:/v3/api-docs}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}
