apiVersion: apps/v1
kind: Deployment
metadata:
  name: video-workflow
  namespace: hackathon
  labels:
    app: video-workflow-app
spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: video-workflow-app

  template:
    metadata:
      labels:
        app: video-workflow-app

    spec:
      serviceAccountName: video-workflow
      terminationGracePeriodSeconds: 30

      containers:
        - name: video-workflow-app
          image: public.ecr.aws/p6c0d2v5/fiap-hackathon:latest
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080

          # 🔐 Variáveis vindas do Secret criado pelo Terraform
          env:
            # ==============================
            # DATABASE
            # ==============================
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SPRING_DATASOURCE_URL

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SPRING_DATASOURCE_USERNAME

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SPRING_DATASOURCE_PASSWORD

            # ==============================
            # AWS CORE
            # ==============================
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: AWS_REGION

            # ==============================
            # S3
            # ==============================
            - name: VIDEO_BUCKET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: VIDEO_BUCKET


            - name: AWS_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: AWS_S3_ENDPOINT
                  optional: true

            - name: AWS_S3_PATH_STYLE_ACCESS
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: AWS_S3_PATH_STYLE_ACCESS
                  optional: true

            # ==============================
            # SNS
            # ==============================
            - name: AWS_SNS_TOPIC_ARN
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: AWS_SNS_TOPIC_ARN


            # ==============================
            # SQS
            # ==============================

            - name: AWS_SQS_STATUS_QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: AWS_SQS_STATUS_QUEUE_URL

          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          # ==============================
          # HEALTH CHECKS
          # ==============================
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5